name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Check CLI
        run: zeno --help
      - name: Check main.py entrypoint
        run: python main.py --help
      - name: Check task list
        run: python main.py task list
      - name: Check task command
        run: python main.py task --help
      - name: Check package imports
        run: python -c "from zeno import Agent, OpenAICompatibleChatModel, default_local_model; print(Agent.__name__)"
